receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  otlphttp/traces:
    endpoint: http://tempo:4318
  otlphttp/metrics:
    endpoint: http://prometheus:9090/api/v1/otlp
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [otlphttp/traces, debug]
    metrics:
      receivers: [otlp]
      exporters: [otlphttp/metrics, debug]
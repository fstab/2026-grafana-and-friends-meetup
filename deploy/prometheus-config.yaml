global:
  scrape_interval: 5s
  scrape_native_histograms: true

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
  - job_name: "beyla"
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      # We only scrape Pods with label app=beyla
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: beyla
    honor_labels: true
